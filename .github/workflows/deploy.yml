name: "Build and Deploy"
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # submodules: true
          # If using the 'assets' git submodule from Chirpy Starter, uncomment above
          # (See: https://github.com/cotes2020/chirpy-starter/tree/main/assets)

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2   # reads from a '.ruby-version' or '.tools-version' file if 'ruby-version' is omitted
          bundler-cache: true

      - name: Clean previous build
        run: |
          # 确保构建环境干净，避免旧文件干扰
          bundle exec jekyll clean
          
      - name: Build site
        run: |
          # 关键点：确保产物是纯静态文件，不带 symlinks
          bundle exec jekyll build -d "_site" --verbose
        env:
          JEKYLL_ENV: "production"

      - name: Test site
        run: |
          bundle exec htmlproofer _site --disable-external --check-html --allow_hash_href

      - name:彻底消除符号链接和硬链接
        run: |
          # 创建一个新的输出目录
          mkdir -p _site_no_symlinks
          
          # 使用 rsync 复制所有文件，确保符号链接被解析为实际文件
          # -a: 归档模式，保留文件属性
          # -L: 复制符号链接指向的实际文件
          # --copy-links: 复制符号链接指向的实际文件（与 -L 类似）
          # --no-hard-links: 不保留硬链接，将它们转换为普通文件
          rsync -aL --copy-links --no-hard-links _site/ _site_no_symlinks/
          
          # 验证新目录中没有符号链接
          SYMLINKS=$(find _site_no_symlinks -type l)
          if [ ! -z "$SYMLINKS" ]; then
            echo "ERROR: Still found symlinks after rsync:"
            echo "$SYMLINKS"
            exit 1
          fi
          
          # 验证新目录中没有硬链接
          HARDLINKS=$(find _site_no_symlinks -type f -links +1)
          if [ ! -z "$HARDLINKS" ]; then
            echo "WARNING: Still found hard links after rsync:"
            echo "$HARDLINKS"
            
            # 进一步处理剩余的硬链接
            find _site_no_symlinks -type f -links +1 | while read -r FILE; do
              cp "$FILE" "$FILE.tmp"
              mv "$FILE.tmp" "$FILE"
            done
          fi
          
          echo "Successfully removed all symlinks and hard links."

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          # 必须叫这个名字，deploy-pages 才能找到它
          name: github-pages
          path: "_site_no_symlinks"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: _site
          
      - name: List artifact contents
        run: |
          ls -la _site
          find _site -type l | head -20
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Optional: Add verbose logging
          verbose: true
