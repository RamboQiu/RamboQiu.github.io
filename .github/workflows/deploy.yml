name: "Build and Deploy"
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # submodules: true
          # If using the 'assets' git submodule from Chirpy Starter, uncomment above
          # (See: https://github.com/cotes2020/chirpy-starter/tree/main/assets)

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2   # reads from a '.ruby-version' or '.tools-version' file if 'ruby-version' is omitted
          bundler-cache: true

      - name: Clean previous build
        run: |
          # 确保构建环境干净，避免旧文件干扰
          bundle exec jekyll clean
          
      - name: Build site
        run: |
          # 关键点：确保产物是纯静态文件，不带 symlinks
          bundle exec jekyll build -d "_site" --verbose
        env:
          JEKYLL_ENV: "production"

      - name: Test site
        run: |
          bundle exec htmlproofer _site --disable-external --check-html --allow_hash_href

      - name: Check for and fix symlinks in build output
        run: |
          # Check for symlinks
          SYMLINKS=$(find _site -type l)
          if [ ! -z "$SYMLINKS" ]; then
            echo "WARNING: Symlinks found in build output! Converting to actual files."
            echo "Symlinks found:"
            echo "$SYMLINKS"
            
            # Convert each symlink to actual file
            find _site -type l | while read -r LINK; do
              TARGET=$(readlink "$LINK")
              echo "Converting symlink $LINK -> $TARGET to actual file"
              
              # Remove the symlink
              rm "$LINK"
              
              # If target is relative, make it absolute
              if [[ "$TARGET" != /* ]]; then
                TARGET="$(dirname "$LINK")/$TARGET"
              fi
              
              # Copy the actual file
              cp "$TARGET" "$LINK"
            done
          fi
          
          # Check for hard links
          HARDLINKS=$(find _site -type f -links +1)
          if [ ! -z "$HARDLINKS" ]; then
            echo "WARNING: Hard links found in build output! Converting to regular files."
            echo "Hard links found:"
            echo "$HARDLINKS"
            
            # Convert each hard link to regular file
            find _site -type f -links +1 | while read -r FILE; do
              echo "Converting hard link $FILE to regular file"
              
              # Create a copy of the file
              cp "$FILE" "$FILE.tmp"
              
              # Replace the hard link with the copy
              mv "$FILE.tmp" "$FILE"
            done
          fi
          
          echo "All symlinks and hard links have been processed."

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          # 必须叫这个名字，deploy-pages 才能找到它
          name: github-pages
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: _site
          
      - name: List artifact contents
        run: |
          ls -la _site
          find _site -type l | head -20
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Optional: Add verbose logging
          verbose: true
